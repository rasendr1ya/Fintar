<svg width="800" height="450" viewBox="0 0 800 450" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5B21B6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:0.05" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="450" fill="url(#bgGradient)"/>
  
  <!-- Decorative circles -->
  <circle cx="650" cy="80" r="120" fill="white" opacity="0.05"/>
  <circle cx="100" cy="380" r="80" fill="white" opacity="0.05"/>
  <circle cx="750" cy="400" r="60" fill="white" opacity="0.08"/>
  
  <!-- Central card/document icon -->
  <g transform="translate(300, 120)">
    <!-- Document shadow -->
    <rect x="8" y="8" width="180" height="200" rx="16" fill="black" opacity="0.1"/>
    <!-- Document -->
    <rect x="0" y="0" width="180" height="200" rx="16" fill="url(#cardGradient)" stroke="white" stroke-opacity="0.3" stroke-width="2"/>
    
    <!-- Lines representing text -->
    <rect x="24" y="30" width="80" height="8" rx="4" fill="white" opacity="0.8"/>
    <rect x="24" y="50" width="132" height="6" rx="3" fill="white" opacity="0.4"/>
    <rect x="24" y="65" width="120" height="6" rx="3" fill="white" opacity="0.4"/>
    <rect x="24" y="80" width="100" height="6" rx="3" fill="white" opacity="0.4"/>
    
    <!-- Image placeholder area -->
    <rect x="24" y="100" width="132" height="70" rx="8" fill="white" opacity="0.15"/>
    
    <!-- Image icon in center -->
    <g transform="translate(70, 120)">
      <circle cx="20" cy="15" r="8" fill="white" opacity="0.5"/>
      <path d="M5 35 L15 22 L25 30 L35 18 L45 35 Z" fill="white" opacity="0.5"/>
    </g>
  </g>
  
  <!-- Fintar text/branding -->
  <text x="400" y="380" text-anchor="middle" fill="white" font-family="system-ui, sans-serif" font-size="24" font-weight="bold" opacity="0.6">
    Fintar Journal
  </text>
  
  <!-- Decorative sparkles -->
  <g fill="white" opacity="0.6">
    <polygon points="200,100 203,108 211,108 205,113 207,121 200,116 193,121 195,113 189,108 197,108" />
    <polygon points="600,150 602,155 607,155 603,158 605,163 600,160 595,163 597,158 593,155 598,155" transform="scale(0.7) translate(250, 50)"/>
    <polygon points="150,250 152,255 157,255 153,258 155,263 150,260 145,263 147,258 143,255 148,255" transform="scale(0.6)"/>
  </g>
</svg>
