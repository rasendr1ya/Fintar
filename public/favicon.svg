  <!-- Eyes -->
  <circle cx="14" cy="13" r="1.5" fill="#0F172A"/>
  <circle cx="18" cy="13" r="1.5" fill="#0F172A"/>
  <circle cx="14.5" cy="12.5" r="0.5" fill="white"/>
  <circle cx="18.5" cy="12.5" r="0.5" fill="white"/>
  
  <!-- Nose -->
