  <path d="M14 17 Q16 19 18 17" stroke="#0F172A" stroke-width="0.8" fill="none" stroke-linecap="round"/>
  
  <!-- Cheek blush -->
  <ellipse cx="11" cy="15" rx="1.2" ry="0.8" fill="#FECACA" opacity="0.6"/>
  <ellipse cx="21" cy="15" rx="1.2" ry="0.8" fill="#FECACA" opacity="0.6"/>
</svg>
